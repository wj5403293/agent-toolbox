name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-33
            build-tools;33.0.0

      - name: Setup Gradle 7.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.5.1'

      - name: Patch build files for CI
        # 项目用 AIDE Pro 在安卓上构建，build.gradle / gradle.properties
        # 硬编码了安卓设备路径，CI 上不存在，需临时移除（不影响仓库源文件）
        run: |
          echo "=== 移除 build.gradle 里的硬编码 buildDir ==="
          sed -i '/^buildDir = new File/d' build.gradle
          echo "=== 移除 gradle.properties 里的安卓硬编码路径 ==="
          sed -i '/org.gradle.project.buildDir=/d' gradle.properties
          sed -i '/org.gradle.java.home=/d' gradle.properties
          echo "=== 修改后预览 ==="
          echo "--- build.gradle (前 25 行) ---"
          sed -n '1,25p' build.gradle
          echo "--- gradle.properties ---"
          cat gradle.properties

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon -PbuildDir=build --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "找到 APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-toolbox-debug-${{ github.sha }}
          path: build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
