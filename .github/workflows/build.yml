name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        # GitHub runner 镜像已预装 platforms;android-33 和 build-tools;33.0.0，
        # 这里只需确保 sdkmanager 许可已接受，无需额外装包
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 7.5.1
        # setup-gradle action 用 runner 预装的 /usr/bin/gradle(8.x) 去 provision
        # 7.5.1 时静默失败，改用直接下载 distribution 的方式，最可控
        run: |
          cd /tmp
          curl -sL --retry 3 https://services.gradle.org/distributions/gradle-7.5.1-bin.zip -o gradle-7.5.1-bin.zip
          unzip -q gradle-7.5.1-bin.zip -d /opt
          echo "/opt/gradle-7.5.1/bin" >> $GITHUB_PATH
          /opt/gradle-7.5.1/bin/gradle --version

      - name: Patch build files for CI
        # 项目用 AIDE Pro 在安卓上构建，build.gradle / gradle.properties
        # 硬编码了安卓设备路径，CI 上不存在，需临时移除（不影响仓库源文件）
        run: |
          echo "=== 移除 build.gradle 里的硬编码 buildDir ==="
          sed -i '/^buildDir = new File/d' build.gradle
          echo "=== 移除 gradle.properties 里的安卓硬编码路径 ==="
          sed -i '/org.gradle.project.buildDir=/d' gradle.properties
          sed -i '/org.gradle.java.home=/d' gradle.properties
          echo "=== 修改后预览 ==="
          echo "--- build.gradle (前 25 行) ---"
          sed -n '1,25p' build.gradle
          echo "--- gradle.properties ---"
          cat gradle.properties

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon -PbuildDir=build --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "找到 APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-toolbox-debug-${{ github.sha }}
          path: build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
