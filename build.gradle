apply plugin: 'com.android.application'

buildDir = new File('/storage/emulated/0/Download/agent-toolbox-main/build')

android {
    namespace 'com.example.agenttoolbox'
    compileSdk 35

    defaultConfig {
        applicationId "com.example.agenttoolbox"
        minSdk 24
        targetSdk 32
        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    sourceSets {
        main {
            java.srcDirs = ['app/src/main/java']
            jniLibs.srcDirs = ['app/src/main/jniLibs']
            assets.srcDirs = ['assets']
            res.srcDirs = ['res']
            manifest.srcFile 'AndroidManifest.xml'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

applicationVariants.all { variant ->
    variant.outputs.all { output ->
        outputFileName = "${rootProject.name}-${variant.versionName}.apk"
    }
}

tasks.withType(com.android.build.gradle.tasks.PackageApplication).configureEach {
    workingDir = buildDir
}
